name: Build Desktop App

on:
  push:
    branches: [main]
    tags:
      - "v*"               # 推 tag（如 v0.1.0）时自动打 Release
  workflow_dispatch:

jobs:
  # ── Windows ──────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./pet/src-tauri -> target"

      - name: Install frontend dependencies
        working-directory: ./pet
        run: pnpm install

      - name: Build & Release Tauri (Windows)
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: ./pet
          tauriScript: pnpm tauri
          tagName: ${{ github.ref_name }}         # 只在推 tag 时生效
          releaseName: "麦麦桌宠 ${{ github.ref_name }}"
          releaseBody: |
            ## 🐱 麦麦桌宠

            一只住在桌面上的 AI 陪伴小猫，随你的健康状态变换表情，可以聊天。

            ### 下载说明
            | 文件 | 说明 |
            |---|---|
            | `pet_*_x64-setup.exe` | Windows 安装包（推荐） |
            | `pet_*_x64_en-US.msi` | Windows MSI 安装包 |
            | `pet_*_x64.dmg` | macOS 安装包 |

            ### 安装后启动后端服务
            - **Windows**：解压 `pet-backend-windows.zip`，双击 `start.bat`
            - **macOS**：解压 `pet-backend-mac.zip`，终端运行 `./start.sh`

            > 后端包在本 Release 附件中，需要 Node.js 18+
          releaseDraft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_HERMES_KEY: change-me-local-dev
          VITE_WORKBENCH_URL: "http://localhost:3002/"

      - name: Upload Windows artifact (备用)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: pet-windows-exe
          path: |
            pet/src-tauri/target/release/bundle/msi/*.msi
            pet/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

  # ── macOS ────────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./pet/src-tauri -> target"

      - name: Install frontend dependencies
        working-directory: ./pet
        run: pnpm install

      - name: Build & Release Tauri (macOS)
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: ./pet
          tauriScript: pnpm tauri
          tagName: ${{ github.ref_name }}
          releaseName: "麦麦桌宠 ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_HERMES_KEY: change-me-local-dev
          VITE_WORKBENCH_URL: "http://localhost:3002/"

      - name: Upload macOS artifact (备用)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: pet-macos-dmg
          path: pet/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: warn

  # ── 上传后端启动包到 Release ──────────────────────────────────────────────────
  upload-backend:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-windows, build-macos]
    steps:
      - uses: actions/checkout@v4

      - name: 打包 macOS 后端
        run: |
          mkdir -p backend-mac/mock backend-mac/types
          cp start.sh stop.sh backend-mac/
          cp mock/server.ts backend-mac/mock/
          cp types/contract.ts backend-mac/types/
          cp pet/.env.example backend-mac/
          node -e "
            const p = require('./package.json');
            const o = { name:'pet-backend', version: p.version || '0.1.0',
              scripts:{ start:'tsx mock/server.ts' },
              dependencies: p.dependencies, devDependencies: p.devDependencies };
            require('fs').writeFileSync('backend-mac/package.json', JSON.stringify(o,null,2));
          "
          zip -r pet-backend-mac.zip backend-mac/

      - name: 打包 Windows 后端
        run: |
          mkdir -p backend-win/mock backend-win/types
          cp start.bat stop.bat backend-win/
          cp mock/server.ts backend-win/mock/
          cp types/contract.ts backend-win/types/
          cp pet/.env.example backend-win/
          cp backend-mac/package.json backend-win/
          zip -r pet-backend-windows.zip backend-win/

      - name: 上传后端包到 Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pet-backend-mac.zip
            pet-backend-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
