<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>📅 Todo 日历</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#f0f4f8 0%,#e8eeff 100%);min-height:100vh;padding:24px 16px}
h1{font-size:22px;font-weight:700;color:#1e293b;display:flex;align-items:center;gap:8px}
.subtitle{font-size:12px;color:#94a3b8;margin-top:2px}
.topbar{display:flex;justify-content:space-between;align-items:center;max-width:960px;margin:0 auto 20px}
.legend{display:flex;gap:14px;background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:8px 14px;font-size:12px}
.legend span{display:flex;align-items:center;gap:4px;font-weight:600}
.btn-today{font-size:13px;padding:7px 16px;background:#fff;border:1px solid #e2e8f0;border-radius:12px;color:#475569;cursor:pointer;font-weight:500}
.btn-today:hover{background:#f8fafc}

/* Calendar */
.cal-wrap{max-width:960px;margin:0 auto;background:#fff;border-radius:20px;box-shadow:0 2px 16px rgba(0,0,0,.07);border:1px solid #f1f5f9;overflow:hidden}
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #f1f5f9}
.cal-nav button{width:36px;height:36px;border:none;background:transparent;cursor:pointer;font-size:22px;color:#94a3b8;border-radius:10px;line-height:1}
.cal-nav button:hover{background:#f1f5f9;color:#475569}
.cal-title{text-align:center}
.cal-title .month{font-size:17px;font-weight:700;color:#1e293b}
.cal-title .stats{font-size:11px;color:#94a3b8;margin-top:2px}
.cal-title .stats b{color:#10b981}
.weekrow{display:grid;grid-template-columns:repeat(7,1fr);background:#f8fafc;border-bottom:1px solid #f1f5f9}
.weekrow div{text-align:center;padding:8px 0;font-size:12px;font-weight:600;color:#64748b}
.weekrow div:first-child,.weekrow div:last-child{color:#f87171}
.grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cell{border-right:1px solid #f1f5f9;border-bottom:1px solid #f1f5f9;min-height:96px;padding:6px;cursor:pointer;transition:background .15s;position:relative;min-width:0;overflow:hidden;width:100%}
.cell:nth-child(7n){border-right:none}
.cell:hover .day-num{background:#ede9fe}
.cell.out{background:#fafafa;cursor:default}
.cell.out .day-num{color:#d1d5db}
.cell.out:hover .day-num{background:transparent}
.day-num{width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#374151;border-radius:50%;margin-bottom:4px}
.day-num.today{background:#6366f1;color:#fff}
.done-badge{position:absolute;top:6px;right:6px;width:16px;height:16px;background:#10b981;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:700}
.chip{font-size:11px;line-height:1.4;padding:2px 5px;border-radius:4px;margin-bottom:2px;overflow:hidden;border-left-width:3px;border-left-style:solid;word-break:break-all;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;cursor:default}
.chip.done{opacity:.4;text-decoration:line-through}
.chip:hover{-webkit-line-clamp:unset;position:relative;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.chip-time{font-size:10px;font-weight:700;opacity:.75;margin-right:3px;letter-spacing:.3px}
.more{font-size:10px;color:#94a3b8;padding-left:4px;font-weight:500}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);backdrop-filter:blur(3px);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.18);width:100%;max-width:440px;max-height:85vh;display:flex;flex-direction:column}
.modal-head{display:flex;justify-content:space-between;align-items:flex-start;padding:20px 20px 16px;border-bottom:1px solid #f1f5f9}
.modal-head h2{font-size:17px;font-weight:700;color:#1e293b}
.modal-head .meta{font-size:12px;color:#94a3b8;margin-top:3px}
.close-btn{width:30px;height:30px;border:none;background:transparent;cursor:pointer;font-size:20px;color:#94a3b8;border-radius:50%;line-height:1}
.close-btn:hover{background:#f1f5f9;color:#475569}
.add-area{padding:14px 20px;background:#f8fafc;border-bottom:1px solid #f1f5f9}
.priority-row{display:flex;gap:8px;margin-bottom:10px}
.p-btn{padding:5px 12px;border-radius:20px;border:1px solid #e2e8f0;background:#fff;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .15s}
.p-btn.active{color:#fff;border-color:transparent;box-shadow:0 2px 6px rgba(0,0,0,.15)}
.input-row{display:flex;gap:8px}
.todo-input{flex:1;font-size:13px;border:1px solid #e2e8f0;border-radius:12px;padding:8px 12px;background:#fff;font-family:inherit;outline:none}
.todo-input:focus{border-color:#818cf8;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.add-btn{padding:8px 16px;background:#6366f1;color:#fff;border:none;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer}
.add-btn:hover{background:#4f46e5}
.add-btn:disabled{opacity:.4;cursor:not-allowed}
.list-area{flex:1;overflow-y:auto;padding:16px 20px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 0;color:#d1d5db}
.empty .icon{font-size:48px;margin-bottom:10px}
.empty p{font-size:13px}

/* Todo item */
.todo-item{border-radius:12px;margin-bottom:8px;overflow:hidden;border:1px solid;transition:opacity .15s}
.todo-item.dragging{opacity:.25}
.todo-item.over-top{box-shadow:0 -2px 0 #6366f1}
.todo-item.over-bot{box-shadow:0 2px 0 #6366f1}
.item-row{display:flex;align-items:center;gap:8px;padding:10px 12px}
.drag-h{font-size:16px;color:#d1d5db;cursor:grab;user-select:none;flex-shrink:0;line-height:1}
.drag-h:active{cursor:grabbing}
.p-badge{font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px;color:#fff;flex-shrink:0}
.item-cb{width:15px;height:15px;cursor:pointer;flex-shrink:0;accent-color:#6366f1}
.item-time{font-size:11px;font-weight:600;color:#6366f1;background:#ede9fe;padding:2px 6px;border-radius:6px;flex-shrink:0;cursor:pointer}
.item-time:hover{background:#c7d2fe}
.time-input{font-size:12px;border:1px solid #e2e8f0;border-radius:10px;padding:6px 8px;color:#374151;background:#fff;outline:none;width:100px;flex-shrink:0;cursor:pointer}
.time-input:focus{border-color:#818cf8;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.item-text{flex:1;font-size:13px;line-height:1.4;word-break:break-all;color:#374151}
.item-text.done{text-decoration:line-through;color:#9ca3af}
.del-btn{background:transparent;border:none;cursor:pointer;font-size:20px;color:#d1d5db;flex-shrink:0;line-height:1;padding:0}
.del-btn:hover{color:#f87171}
.retro-box{padding:0 12px 12px}
.retro-label{font-size:11px;color:#94a3b8;margin-bottom:6px;display:flex;align-items:center;gap:4px}
.retro-ta{width:100%;font-size:12px;border:1px solid #e2e8f0;border-radius:10px;padding:8px 10px;font-family:inherit;color:#475569;background:#fff;outline:none;resize:vertical}
.retro-ta:focus{border-color:#a5b4fc;box-shadow:0 0 0 2px rgba(99,102,241,.1)}
.retro-ta::placeholder{color:#d1d5db}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:4px}
.footer{text-align:center;font-size:11px;color:#cbd5e1;margin-top:12px;max-width:960px;margin-left:auto;margin-right:auto}

/* ── Sync UI ──────────────────────────────────────────────────── */
.sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block;background:#d1d5db;flex-shrink:0;transition:background .3s}
.sync-dot.on{background:#10b981}
.sync-chip{display:flex;align-items:center;gap:5px;font-size:11px;color:#64748b;font-weight:500}
.btn-sync{font-size:13px;padding:7px 13px;background:#6366f1;border:none;border-radius:12px;color:#fff;cursor:pointer;font-weight:600;letter-spacing:.3px}
.btn-sync:hover{background:#4f46e5}
.sync-section{padding:16px 20px;border-bottom:1px solid #f1f5f9}
.sync-section-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.sync-section-title h3{font-size:14px;font-weight:600;color:#1e293b;display:flex;align-items:center;gap:7px}
.sync-badge{font-size:11px;color:#94a3b8;font-weight:500}
.sync-badge.on{color:#10b981}
.sync-field{width:100%;font-size:13px;border:1px solid #e2e8f0;border-radius:10px;padding:8px 12px;font-family:inherit;outline:none;margin-bottom:8px}
.sync-field:focus{border-color:#818cf8;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.sync-hint{font-size:11px;color:#94a3b8;margin-bottom:10px;line-height:1.5}
.sync-action-btn{width:100%;padding:9px;background:#fff;border:1px solid #e2e8f0;border-radius:10px;font-size:13px;cursor:pointer;font-weight:500;color:#374151;transition:background .15s}
.sync-action-btn:hover{background:#f8fafc}
.sync-action-btn:disabled{opacity:.5;cursor:not-allowed}
.sync-now-btn{flex:1;padding:10px 20px;background:#6366f1;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s}
.sync-now-btn:hover{background:#4f46e5}
.sync-now-btn:disabled{opacity:.5;cursor:not-allowed}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
#auto-pulse{width:7px;height:7px;border-radius:50%;background:#6366f1;display:none;animation:pulse 2s ease-in-out infinite;flex-shrink:0}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <h1>📅 Todo 日历</h1>
    <div class="subtitle">点击日期 · 管理待办 · 复盘记录</div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="legend">
      <span style="color:#dc2626">🔴 P0</span>
      <span style="color:#ea580c">🟠 P1</span>
      <span style="color:#2563eb">🔵 P2</span>
    </div>
    <!-- Sync status + button -->
    <div style="display:flex;align-items:center;gap:8px">
      <div class="sync-chip"><span id="gdot" class="sync-dot"></span>G</div>
      <div class="sync-chip"><span id="idot" class="sync-dot"></span>iCloud</div>
      <span id="auto-pulse"></span>
      <button class="btn-sync" onclick="openSyncModal()">⇄ 同步</button>
    </div>
    <button class="btn-today" onclick="goToday()">今天</button>
  </div>
</div>

<div class="cal-wrap">
  <div class="cal-nav">
    <button onclick="prevMonth()">‹</button>
    <div class="cal-title">
      <div class="month" id="cal-title"></div>
      <div class="stats" id="cal-stats"></div>
    </div>
    <button onclick="nextMonth()">›</button>
  </div>
  <div class="weekrow">
    <div>日</div><div>一</div><div>二</div><div>三</div>
    <div>四</div><div>五</div><div>六</div>
  </div>
  <div class="grid" id="cal-grid"></div>
</div>

<div class="footer">数据保存在本地浏览器 · 清除缓存会丢失数据</div>

<!-- Todo Modal -->
<div class="overlay" id="overlay" style="display:none" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-head">
      <div>
        <h2 id="modal-title"></h2>
        <div class="meta" id="modal-meta"></div>
      </div>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div class="add-area">
      <div class="priority-row" id="priority-row"></div>
      <div class="input-row">
        <input type="time" id="time-input" class="time-input" title="指定时间（可选）"/>
        <input class="todo-input" id="todo-input" placeholder="输入待办，Enter 快速添加…"
               oninput="toggleAddBtn()" onkeydown="inputKeydown(event)"/>
        <button class="add-btn" id="add-btn" onclick="addTodo()" disabled>添加</button>
      </div>
    </div>
    <div class="list-area" id="list-area"></div>
  </div>
</div>

<!-- Sync Settings Modal -->
<div class="overlay" id="sync-ov" style="display:none" onclick="if(event.target===this)closeSyncModal()">
  <div class="modal" style="max-width:390px">
    <div class="modal-head">
      <div>
        <h2>⇄ 日历同步</h2>
        <div class="meta" id="sync-last-label">从未同步</div>
      </div>
      <button class="close-btn" onclick="closeSyncModal()">×</button>
    </div>

    <!-- Google Calendar -->
    <div class="sync-section">
      <div class="sync-section-title">
        <h3><span id="gdot-m" class="sync-dot"></span>Google Calendar</h3>
        <span id="gbadge" class="sync-badge">未连接</span>
      </div>
      <button id="gbtn" class="sync-action-btn" onclick="connectGoogle()">连接 Google Calendar</button>
      <div class="sync-hint" style="margin-top:8px">需要在 <b>.env</b> 中配置 Google OAuth 凭据</div>
    </div>

    <!-- iCloud Calendar -->
    <div class="sync-section">
      <div class="sync-section-title">
        <h3><span id="idot-m" class="sync-dot"></span>iCloud Calendar</h3>
        <span id="ibadge" class="sync-badge">未连接</span>
      </div>
      <!-- Connected view -->
      <div id="caldav-ok" style="display:none;margin-bottom:10px">
        <div style="font-size:12px;color:#10b981;font-weight:600;margin-bottom:8px" id="caldav-user-label">✅ 已连接</div>
        <div id="cal-picker-wrap" style="display:none;margin-bottom:8px">
          <div style="font-size:11px;color:#94a3b8;margin-bottom:5px">同步哪个日历</div>
          <select id="cal-picker" onchange="switchCalendar(this.value)" style="width:100%;font-size:13px;border:1px solid #e2e8f0;border-radius:10px;padding:7px 10px;color:#374151;background:#fff;outline:none"></select>
        </div>
        <button class="sync-action-btn" onclick="showCaldavForm()" style="font-size:12px;padding:6px 10px">更换账号 / 密码</button>
      </div>
      <!-- Form view -->
      <div id="caldav-form">
        <input id="cdav-user" class="sync-field" type="email" placeholder="Apple ID（邮箱）"/>
        <input id="cdav-pass" class="sync-field" type="password" placeholder="应用专用密码（xxxx-xxxx-xxxx-xxxx）"/>
        <div class="sync-hint">在 <b>appleid.apple.com → 安全 → 应用专用密码</b> 生成<br>已连接时密码可留空（保持不变）</div>
        <button id="ibtn" class="sync-action-btn" onclick="connectCaldav()">连接 iCloud Calendar</button>
      </div>

    <!-- Auto-sync interval -->
    <div style="padding:12px 20px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between">
      <span style="font-size:13px;font-weight:500;color:#374151">自动同步间隔</span>
      <select id="sync-interval" onchange="updateAutoSyncInterval()" style="font-size:13px;border:1px solid #e2e8f0;border-radius:8px;padding:5px 10px;color:#374151;background:#fff;cursor:pointer;outline:none">
        <option value="30">30 秒</option>
        <option value="60" selected>1 分钟</option>
        <option value="300">5 分钟</option>
        <option value="0">关闭</option>
      </select>
    </div>
    <!-- Sync button -->
    <div style="padding:16px 20px;display:flex;align-items:center;gap:12px">
      <button id="sync-now-btn" class="sync-now-btn" onclick="syncAll()">立即同步</button>
    </div>
  </div>
</div>

<script>
// ── Config ─────────────────────────────────────────────────────────
const P = {
  P0:{key:'P0',label:'P0',emoji:'🔴',hex:'#ef4444',bg:'#fef2f2',border:'#fca5a5',text:'#dc2626'},
  P1:{key:'P1',label:'P1',emoji:'🟠',hex:'#f97316',bg:'#fff7ed',border:'#fdba74',text:'#ea580c'},
  P2:{key:'P2',label:'P2',emoji:'🔵',hex:'#3b82f6',bg:'#eff6ff',border:'#93c5fd',text:'#2563eb'},
};
const MONTHS=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];

// ── State ──────────────────────────────────────────────────────────
let now=new Date(), curYear=now.getFullYear(), curMonth=now.getMonth();
let todos={};
let modalDk=null, selPriority='P2', dragIdx=null, overIdx=null;

// ── Storage ────────────────────────────────────────────────────────
function loadData(){try{return JSON.parse(localStorage.getItem('todo-cal-v2')||'{}')}catch{return{}}}
let _saveTid=null;
function saveData(){
  localStorage.setItem('todo-cal-v2',JSON.stringify(todos));
  clearTimeout(_saveTid);
  _saveTid=setTimeout(()=>{
    fetch(S_API+'/api/todos',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({todos})}).catch(()=>{});
  },600);
}
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36)}
function dateKey(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
function todayKey(){return dateKey(now.getFullYear(),now.getMonth(),now.getDate())}

// ── Calendar ───────────────────────────────────────────────────────
function renderCalendar(){
  const firstWd=new Date(curYear,curMonth,1).getDay();
  const daysInCur=new Date(curYear,curMonth+1,0).getDate();
  const daysInPrev=new Date(curYear,curMonth,0).getDate();
  const prevY=curMonth===0?curYear-1:curYear, prevM=curMonth===0?11:curMonth-1;
  const nextY=curMonth===11?curYear+1:curYear, nextM=curMonth===11?0:curMonth+1;

  document.getElementById('cal-title').textContent=`${curYear} · ${MONTHS[curMonth]}`;

  const cells=[];
  for(let i=firstWd-1;i>=0;i--) cells.push({day:daysInPrev-i,dk:dateKey(prevY,prevM,daysInPrev-i),in:false});
  for(let d=1;d<=daysInCur;d++) cells.push({day:d,dk:dateKey(curYear,curMonth,d),in:true});
  for(let d=1;cells.length<42;d++) cells.push({day:d,dk:dateKey(nextY,nextM,d),in:false});

  const mKeys=cells.filter(c=>c.in).map(c=>c.dk);
  const total=mKeys.reduce((s,k)=>s+(todos[k]?.length||0),0);
  const done=mKeys.reduce((s,k)=>s+(todos[k]?.filter(t=>t.done).length||0),0);
  const statsEl=document.getElementById('cal-stats');
  if(total>0){
    statsEl.innerHTML=`本月 ${total} 项 · 完成 ${done} 项 <b>${Math.round(done/total*100)}%</b>`;
  } else { statsEl.textContent=''; }

  const grid=document.getElementById('cal-grid');
  grid.innerHTML='';
  const tk=todayKey();
  cells.forEach(c=>{
    const list=todos[c.dk]||[];
    const allDone=list.length>0&&list.every(t=>t.done);
    const div=document.createElement('div');
    div.className='cell'+(c.in?'':' out');
    if(c.in) div.onclick=()=>openModal(c.dk,`${curYear}年${curMonth+1}月${c.day}日`);

    let html=`<div class="day-num${c.dk===tk?' today':''}">${c.day}</div>`;
    if(allDone) html+=`<div class="done-badge">✓</div>`;
    const sorted=[...list].sort((a,b)=>{if(!a.time&&!b.time)return 0;if(!a.time)return 1;if(!b.time)return -1;return a.time.localeCompare(b.time)});
    sorted.slice(0,3).forEach(t=>{
      const p=P[t.priority]||P.P2;
      const tpfx=t.time?`<span class="chip-time">${t.time}</span>`:'';
      html+=`<div class="chip${t.done?' done':''}" title="${t.time?t.time+' ':''}${esc(t.content)}"
        style="background:${p.bg};color:${p.text};border-left-color:${p.hex}">${tpfx}${esc(t.content)}</div>`;
    });
    if(list.length>3) html+=`<div class="more">+${list.length-3} 项</div>`;
    div.innerHTML=html;
    grid.appendChild(div);
  });
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function prevMonth(){if(curMonth===0){curYear--;curMonth=11}else curMonth--;renderCalendar()}
function nextMonth(){if(curMonth===11){curYear++;curMonth=0}else curMonth++;renderCalendar()}
function goToday(){curYear=now.getFullYear();curMonth=now.getMonth();renderCalendar()}

// ── Modal ──────────────────────────────────────────────────────────
function openModal(dk,label){
  modalDk=dk; selPriority='P2';
  document.getElementById('modal-title').textContent=label;
  document.getElementById('todo-input').value='';
  document.getElementById('time-input').value='';
  document.getElementById('add-btn').disabled=true;
  renderPriorityBtns();
  renderList();
  updateMeta();
  document.getElementById('overlay').style.display='flex';
  setTimeout(()=>document.getElementById('todo-input').focus(),50);
}

function closeModal(){
  document.getElementById('overlay').style.display='none';
  modalDk=null; renderCalendar();
}

function overlayClick(e){if(e.target===document.getElementById('overlay')) closeModal();}

document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeSyncModal();}});

function updateMeta(){
  const list=todos[modalDk]||[];
  const done=list.filter(t=>t.done).length;
  document.getElementById('modal-meta').textContent=
    list.length===0?'暂无待办':`${list.length} 项待办 · 已完成 ${done} 项`;
}

function renderPriorityBtns(){
  const row=document.getElementById('priority-row');
  row.innerHTML='';
  Object.values(P).forEach(p=>{
    const btn=document.createElement('button');
    btn.className='p-btn'+(selPriority===p.key?' active':'');
    btn.innerHTML=`${p.emoji} ${p.label}`;
    if(selPriority===p.key) btn.style.background=p.hex;
    btn.onclick=()=>{selPriority=p.key;renderPriorityBtns()};
    row.appendChild(btn);
  });
}

function toggleAddBtn(){
  document.getElementById('add-btn').disabled=!document.getElementById('todo-input').value.trim();
}

function inputKeydown(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addTodo();}}

function addTodo(){
  const text=document.getElementById('todo-input').value.trim();
  if(!text)return;
  if(!todos[modalDk])todos[modalDk]=[];
  const timeVal=document.getElementById('time-input').value||null;
  const newTodo={id:uid(),content:text,priority:selPriority,done:false,retro:'',time:timeVal};
  document.getElementById('time-input').value='';
  todos[modalDk].push(newTodo);
  saveData();
  document.getElementById('todo-input').value='';
  document.getElementById('add-btn').disabled=true;
  document.getElementById('todo-input').focus();
  renderList(); updateMeta();
  syncTodo(modalDk,newTodo,'upsert');
}

// ── List render ────────────────────────────────────────────────────
function renderList(){
  const list=todos[modalDk]||[];
  const area=document.getElementById('list-area');
  if(list.length===0){
    area.innerHTML='<div class="empty"><div class="icon">📋</div><p>还没有待办，快来添加吧~</p></div>';
    return;
  }
  area.innerHTML='';
  list.forEach((t,i)=>area.appendChild(makeItem(t,i)));
}

function makeItem(t,i){
  const p=P[t.priority]||P.P2;
  const wrap=document.createElement('div');
  wrap.className='todo-item';
  wrap.style.borderColor=p.border;
  wrap.style.background=p.bg;
  wrap.draggable=true;
  wrap.dataset.idx=i;

  wrap.addEventListener('dragstart',e=>{e.dataTransfer.effectAllowed='move';dragIdx=i;wrap.classList.add('dragging');});
  wrap.addEventListener('dragend',()=>{dragIdx=null;overIdx=null;renderList();});
  wrap.addEventListener('dragenter',e=>{e.preventDefault();if(dragIdx===null||dragIdx===i)return;
    overIdx=i;
    document.querySelectorAll('.todo-item').forEach(el=>el.classList.remove('over-top','over-bot'));
    wrap.classList.add(i<=dragIdx?'over-top':'over-bot');
  });
  wrap.addEventListener('dragover',e=>e.preventDefault());
  wrap.addEventListener('drop',e=>{
    e.preventDefault();
    if(dragIdx===null||dragIdx===i)return;
    const list=todos[modalDk]||[];
    const arr=[...list]; const [item]=arr.splice(dragIdx,1); arr.splice(i,0,item);
    todos[modalDk]=arr; saveData(); dragIdx=null; overIdx=null; renderList(); updateMeta();
  });

  const row=document.createElement('div');
  row.className='item-row';
  row.innerHTML=`
    <span class="drag-h" title="拖动排序">⠿</span>
    <span class="p-badge" style="background:${p.hex}">${p.label}</span>
    <span class="item-time" title="点击修改时间" data-idx="${i}">${t.time||'+ 时间'}</span>
    <input type="checkbox" class="item-cb" ${t.done?'checked':''}/>
    <span class="item-text${t.done?' done':''}">${esc(t.content)}</span>
    <button class="del-btn" title="删除">×</button>
  `;

  row.querySelector('.item-time').addEventListener('click',function(){
    const inp=document.createElement('input');
    inp.type='time'; inp.className='time-input'; inp.value=t.time||'';
    inp.style.cssText='width:90px;font-size:11px;padding:2px 6px';
    this.replaceWith(inp); inp.focus();
    const commit=()=>{
      const v=inp.value||null;
      todos[modalDk][i].time=v;
      const snap={...todos[modalDk][i]};
      saveData(); renderList(); updateMeta();
      syncTodo(modalDk,snap,'upsert');
    };
    inp.addEventListener('change',commit);
    inp.addEventListener('blur',commit);
  });

  row.querySelector('.item-cb').addEventListener('change',()=>{
    todos[modalDk][i].done=!todos[modalDk][i].done;
    const snap={...todos[modalDk][i]};
    saveData(); renderList(); updateMeta();
    syncTodo(modalDk,snap,'upsert');
  });

  row.querySelector('.del-btn').addEventListener('click',()=>{
    const snap={...t};
    todos[modalDk].splice(i,1);
    if(!todos[modalDk].length) delete todos[modalDk];
    saveData(); renderList(); updateMeta();
    syncTodo(modalDk,snap,'delete');
  });

  wrap.appendChild(row);

  if(t.done){
    const retro=document.createElement('div');
    retro.className='retro-box';
    retro.innerHTML=`
      <div class="retro-label">📝 复盘记录</div>
      <textarea class="retro-ta" rows="2" placeholder="记录结果、收获或下次改进点…">${esc(t.retro||'')}</textarea>
    `;
    retro.querySelector('textarea').addEventListener('input',e=>{
      todos[modalDk][i].retro=e.target.value; saveData();
    });
    wrap.appendChild(retro);
  }

  return wrap;
}

// ── Sync Layer ─────────────────────────────────────────────────────
const S_API='http://localhost:3456';
let ss={google:false,caldav:false,down:false};
let _autoTimer=null;
const INTERVAL_KEY='_auto_sync_interval';

async function initSync(){
  try{
    const r=await fetch(S_API+'/api/status',{signal:AbortSignal.timeout(2500)});
    const d=await r.json();
    ss={google:d.google.connected,caldav:d.caldav.connected,caldavUser:d.caldav.user||'',down:false};
  }catch{ss.down=true;}
  _updateDots();
  _applyCaldavState();
  if(!ss.down&&(ss.google||ss.caldav)) startAutoSync();
}

function _updateDots(){
  const setDot=(id,on)=>{const el=document.getElementById(id);if(el)el.className='sync-dot'+(on?' on':'');};
  setDot('gdot',ss.google);setDot('gdot-m',ss.google);
  setDot('idot',ss.caldav);setDot('idot-m',ss.caldav);
  const gb=document.getElementById('gbadge'),ib=document.getElementById('ibadge');
  if(gb){gb.textContent=ss.down?'服务器未启动':ss.google?'✅ 已连接':'未连接';gb.className='sync-badge'+(ss.google?' on':'');}
  if(ib){
    ib.textContent=ss.down?'服务器未启动':ss.caldav?(ss.caldavUser||'✅ 已连接'):'未连接';
    ib.className='sync-badge'+(ss.caldav?' on':'');
  }
}

// Switch between connected-view and form-view for iCloud
function _applyCaldavState(){
  const ok=document.getElementById('caldav-ok');
  const form=document.getElementById('caldav-form');
  if(!ok||!form) return;
  if(ss.caldav&&ss.caldavUser){
    ok.style.display='block'; form.style.display='none';
    const lbl=document.getElementById('caldav-user-label');
    if(lbl) lbl.textContent='✅ 已连接：'+ss.caldavUser;
    // Pre-fill email so switching is easy
    const uf=document.getElementById('cdav-user');
    if(uf) uf.value=ss.caldavUser;
  }else{
    ok.style.display='none'; form.style.display='block';
  }
}

function showCaldavForm(){
  document.getElementById('caldav-ok').style.display='none';
  document.getElementById('caldav-form').style.display='block';
  document.getElementById('cdav-pass').value='';
  setTimeout(()=>document.getElementById('cdav-user').focus(),50);
}

function _updateLastLabel(){
  const ls=localStorage.getItem('_last_sync');
  const el=document.getElementById('sync-last-label');
  if(el)el.textContent=ls?('上次同步: '+new Date(ls).toLocaleString('zh-CN',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})):'从未同步';
}

function startAutoSync(){
  clearInterval(_autoTimer);
  const sec=parseInt(localStorage.getItem(INTERVAL_KEY)||'60',10);
  const sel=document.getElementById('sync-interval');
  if(sel)sel.value=String(sec);
  const pulse=document.getElementById('auto-pulse');
  if(sec===0){if(pulse)pulse.style.display='none';return;}
  if(pulse)pulse.style.display='inline-block';
  _autoTimer=setInterval(()=>pullFromCalendars(true),sec*1000);
}

function updateAutoSyncInterval(){
  const val=parseInt(document.getElementById('sync-interval').value,10);
  localStorage.setItem(INTERVAL_KEY,String(val));
  startAutoSync();
  showToast(val===0?'已关闭自动同步':`自动同步已设置：每 ${val<60?val+'秒':val/60+'分钟'} 拉取一次`);
}

function openSyncModal(){
  _updateDots();_updateLastLabel();
  _applyCaldavState();
  const sel=document.getElementById('sync-interval');
  if(sel)sel.value=localStorage.getItem(INTERVAL_KEY)||'60';
  document.getElementById('sync-ov').style.display='flex';
  if(ss.caldav) loadCalendarPicker();
}
function closeSyncModal(){document.getElementById('sync-ov').style.display='none';}

async function connectGoogle(){
  if(ss.down){showToast('❌ 同步服务器未启动，请运行 node server.js');return;}
  const btn=document.getElementById('gbtn');
  btn.textContent='请求中...';btn.disabled=true;
  try{
    const r=await fetch(S_API+'/api/google/auth-url');
    const d=await r.json();
    if(d.error){showToast('❌ '+d.error);return;}
    const w=window.open(d.url,'_google_auth','width=520,height=640,left=200,top=100');
    const onMsg=async e=>{
      if(e.data==='google-connected'){
        w&&w.close();window.removeEventListener('message',onMsg);
        await initSync();showToast('✅ Google Calendar 已连接');
      }
    };
    window.addEventListener('message',onMsg);
  }catch(e){showToast('❌ '+e.message);
  }finally{btn.textContent='连接 Google Calendar';btn.disabled=false;}
}

async function connectCaldav(){
  if(ss.down){showToast('❌ 同步服务器未启动，请运行 node server.js');return;}
  const user=document.getElementById('cdav-user').value.trim();
  const pass=document.getElementById('cdav-pass').value.trim();
  if(!user){showToast('请填写 Apple ID 邮箱');return;}
  // pass can be empty if already connected (server reuses saved password)
  if(!pass&&!ss.caldav){showToast('请填写应用专用密码');return;}
  const btn=document.getElementById('ibtn');
  btn.textContent='连接中...';btn.disabled=true;
  try{
    const body={username:user};
    if(pass) body.password=pass;  // omit to reuse saved password on server
    const r=await fetch(S_API+'/api/caldav/connect',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    const d=await r.json();
    if(d.ok){
      ss.caldav=true;ss.caldavUser=user;
      _updateDots();_applyCaldavState();
      showToast('✅ iCloud Calendar 已连接：'+user);
      await loadCalendarPicker();
      startAutoSync();
    }else showToast('❌ '+d.error);
  }catch(e){showToast('❌ '+e.message);
  }finally{btn.textContent='连接 iCloud Calendar';btn.disabled=false;}
}

async function loadCalendarPicker(){
  try{
    const r=await fetch(S_API+'/api/caldav/calendars');
    const d=await r.json();
    if(!d.calendars||!d.calendars.length)return;
    const wrap=document.getElementById('cal-picker-wrap');
    const sel=document.getElementById('cal-picker');
    sel.innerHTML='';
    d.calendars.forEach(c=>{
      const o=document.createElement('option');
      o.value=c.url;
      o.textContent=c.name||c.url;
      o.selected=!!c.active;
      sel.appendChild(o);
    });
    wrap.style.display='block';
  }catch{}
}

async function switchCalendar(url){
  try{
    await fetch(S_API+'/api/caldav/set-calendar',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({url})
    });
    showToast('✅ 已切换日历');
  }catch(e){showToast('❌ '+e.message);}
}

async function syncTodo(date,todo,action){
  if(ss.down)return;
  const ps=[];
  if(ss.google){
    if(action==='upsert'){
      ps.push(fetch(S_API+'/api/google/event',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({date,todo})
      }).then(r=>r.json()).then(d=>{
        if(d.gcalId&&d.gcalId!==todo.gcalId){
          const t=(todos[date]||[]).find(x=>x.id===todo.id);
          if(t){t.gcalId=d.gcalId;saveData();}
        }
      }).catch(()=>{}));
    }else if(action==='delete'&&todo.gcalId){
      ps.push(fetch(S_API+'/api/google/event/'+todo.gcalId,{method:'DELETE'}).catch(()=>{}));
    }
  }
  if(ss.caldav){
    if(action==='upsert'){
      ps.push(fetch(S_API+'/api/caldav/event',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({date,todo})
      }).then(r=>r.json()).then(d=>{
        if(d.icalId&&d.icalId!==todo.icalId){
          const t=(todos[date]||[]).find(x=>x.id===todo.id);
          if(t){t.icalId=d.icalId;saveData();}
        }
      }).catch(()=>{}));
    }else if(action==='delete'&&todo.icalId){
      ps.push(fetch(S_API+'/api/caldav/event/'+encodeURIComponent(todo.icalId),{method:'DELETE'}).catch(()=>{}));
    }
  }
  await Promise.all(ps);
}

// Pull-only: fetch calendar events and import ones not yet in local todos
async function pullFromCalendars(silent=false){
  if(ss.down||(!ss.google&&!ss.caldav))return;
  let changed=false;
  try{
    if(ss.google){
      const r=await fetch(`${S_API}/api/google/events?year=${curYear}&month=${curMonth+1}`);
      const d=await r.json();
      for(const ev of(d.events||[])){
        if(!ev.date||!ev.props._todoId)continue;
        if((todos[ev.date]||[]).find(t=>t.id===ev.props._todoId||t.gcalId===ev.gcalId))continue;
        if(!todos[ev.date])todos[ev.date]=[];
        todos[ev.date].push({id:ev.props._todoId||uid(),content:ev.summary.replace(/^\[P\d\]\s*/,''),priority:ev.props._todoPriority||'P2',done:ev.props._todoDone==='true',retro:'',gcalId:ev.gcalId,time:ev.time||null});
        changed=true;
      }
    }
    if(ss.caldav){
      const r=await fetch(`${S_API}/api/caldav/events?year=${curYear}&month=${curMonth+1}`);
      const d=await r.json();
      const pMap={'1':'P0','5':'P1','9':'P2'};
      for(const ev of(d.events||[])){
        if(!ev.date||!ev.summary)continue;
        // Match by icalId or todoId (avoid duplicates)
        if((todos[ev.date]||[]).find(t=>
          (ev.icalId&&t.icalId===ev.icalId)||
          (ev.todoId&&t.id===ev.todoId)
        ))continue;
        if(!todos[ev.date])todos[ev.date]=[];
        // Strip [Px] prefix added by this app, leave original title otherwise
        const content=ev.summary.replace(/^\[P[012]\]\s*/,'');
        todos[ev.date].push({
          id:ev.todoId||uid(),
          content,
          priority:pMap[ev.priority]||'P2',
          done:ev.done,
          retro:'',
          icalId:ev.icalId,
          time:ev.time||null
        });
        changed=true;
      }
    }
    if(changed){saveData();renderCalendar();if(modalDk)renderList();}
    localStorage.setItem('_last_sync',new Date().toISOString());
    _updateLastLabel();
    if(changed&&!silent)showToast('✅ 发现新事件，已导入');
  }catch(e){
    if(!silent)showToast('❌ 拉取失败: '+e.message);
  }
}

async function syncAll(){
  if(ss.down){showToast('❌ 同步服务器未启动，请运行 node server.js');return;}
  const btn=document.getElementById('sync-now-btn');
  btn.textContent='同步中...';btn.disabled=true;
  try{
    for(const[date,list]of Object.entries(todos))
      for(const t of list) await syncTodo(date,t,'upsert');
    await pullFromCalendars(true);
    localStorage.setItem('_last_sync',new Date().toISOString());
    _updateLastLabel();
    showToast('✅ 全量同步完成');
  }catch(e){showToast('❌ 同步失败: '+e.message);
  }finally{btn.textContent='立即同步';btn.disabled=false;}
}

function showToast(msg){
  let t=document.getElementById('_toast');
  if(!t){
    t=document.createElement('div');t.id='_toast';
    t.style.cssText='position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 20px;border-radius:12px;font-size:13px;z-index:9999;transition:opacity .3s;pointer-events:none;white-space:nowrap';
    document.body.appendChild(t);
  }
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(t._tid);t._tid=setTimeout(()=>{t.style.opacity='0';},3000);
}

// ── Init ───────────────────────────────────────────────────────────
(async function init(){
  try{
    const r=await fetch(S_API+'/api/todos',{signal:AbortSignal.timeout(2000)});
    const d=await r.json();
    const serverTodos=d.todos||{};
    if(Object.keys(serverTodos).length>0){
      todos=serverTodos;
      localStorage.setItem('todo-cal-v2',JSON.stringify(todos));
    } else {
      // First run or empty server — migrate from localStorage
      todos=loadData();
      if(Object.keys(todos).length>0){
        fetch(S_API+'/api/todos',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({todos})}).catch(()=>{});
      }
    }
  } catch {
    // Server unreachable — fall back to localStorage
    todos=loadData();
  }
  renderCalendar();
  initSync();
})();
</script>
